<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  body { background: #0f172a; color: #e2e8f0; padding-bottom: 80px; }
 .header { background: #1e293b; padding: 16px; text-align: center; font-weight: 700; font-size: 18px; position: sticky; top: 0; z-index: 10; }
 .tabs { display: flex; background: #1e293b; position: fixed; bottom: 0; width: 100%; border-top: 1px solid #334155; }
 .tab { flex: 1; padding: 12px 4px; text-align: center; font-size: 11px; color: #94a3b8; cursor: pointer; }
 .tab.active { color: #0ea5e9; font-weight: 600; }
 .tab-icon { font-size: 20px; display: block; margin-bottom: 2px; }
 .page { display: none; padding: 16px; animation: fade.2s; }
 .page.active { display: block; }
  @keyframes fade { from { opacity: 0; } }
 .card { background: #1e293b; border-radius: 12px; padding: 16px; margin-bottom: 12px; border: 1px solid #334155; }
 .card-title { font-size: 14px; color: #94a3b8; margin-bottom: 8px; }
 .card-value { font-size: 24px; font-weight: 700; color: #0ea5e9; }
 .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  input, select, button { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #e2e8f0; font-size: 16px; margin-bottom: 12px; }
  button { background: #0ea5e9; border: none; font-weight: 600; cursor: pointer; }
  button:active { opacity:.8; }
  button.secondary { background: #334155; }
  button.danger { background: #ef4444; }
 .list-item { background: #1e293b; padding: 12px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
 .badge { background: #334155; padding: 4px 8px; border-radius: 6px; font-size: 12px; }
 .badge.red { background: #ef4444; }
 .badge.green { background: #10b981; }
 .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
 .switch input { opacity: 0; width: 0; height: 0; }
 .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #334155; transition:.2s; border-radius: 26px; }
 .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background: white; transition:.2s; border-radius: 50%; }
  input:checked +.slider { background: #0ea5e9; }
  input:checked +.slider:before { transform: translateX(24px); }
 .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #10b981; padding: 12px 20px; border-radius: 8px; font-weight: 600; z-index: 100; display: none; }
 .sync-status { font-size: 12px; color: #94a3b8; text-align: center; margin-top: 8px; }
</style>
</head>
<body>

<div class="header">💊 Balcão Suplementos</div>
<div class="toast" id="toast"></div>

<div class="page active" id="page-dash">
  <div class="grid">
    <div class="card"><div class="card-title">Vendas Hoje</div><div class="card-value" id="vendasHoje">R$ 0</div></div>
    <div class="card"><div class="card-title">Lucro Hoje</div><div class="card-value" id="lucroHoje">R$ 0</div></div>
    <div class="card"><div class="card-title">Ticket Médio</div><div class="card-value" id="ticketMedio">R$ 0</div></div>
    <div class="card"><div class="card-title">Estoque Baixo</div><div class="card-value" id="estoqueBaixo">0</div></div>
  </div>
  <div class="card">
    <div class="card-title">Top Produtos</div>
    <div id="topProdutos">Nenhuma venda ainda</div>
  </div>
</div>

<div class="page" id="page-venda">
  <div class="card">
    <select id="vendaProduto"><option value="">Selecione o produto</option></select>
    <input type="number" id="vendaQtd" placeholder="Quantidade" min="1" value="1">
    <input type="number" id="vendaPreco" placeholder="Preço de venda" step="0.01">
    <button onclick="registrarVenda()">Registrar Venda</button>
  </div>
  <div id="ultimasVendas"></div>
</div>

<div class="page" id="page-produtos">
  <div class="card">
    <input id="prodNome" placeholder="Nome do produto">
    <input type="number" id="prodCusto" placeholder="Custo" step="0.01">
    <input type="number" id="prodMargem" placeholder="Margem %" step="1">
    <input type="number" id="prodEstoque" placeholder="Estoque inicial" min="0">
    <input type="number" id="prodEstoqueMin" placeholder="Estoque mínimo" min="0">
    <button onclick="salvarProduto()">Salvar Produto</button>
  </div>
  <div id="listaProdutos"></div>
</div>

<div class="page" id="page-despesas">
  <div class="card">
    <input id="despDesc" placeholder="Descrição">
    <input type="number" id="despValor" placeholder="Valor" step="0.01">
    <button onclick="salvarDespesa()">Adicionar Despesa</button>
  </div>
  <div id="listaDespesas"></div>
</div>

<div class="page" id="page-config">
  <div class="card">
    <div class="card-title">URL do Google Apps Script</div>
    <input id="scriptUrl" placeholder="https://script.google.com/macros/s/.../exec">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
      <span>Sincronização Automática</span>
      <label class="switch"><input type="checkbox" id="autoSync"><span class="slider"></span></label>
    </div>
    <button onclick="salvarConfig()">Salvar Configuração</button>
    <button class="secondary" onclick="sincronizarAgora()">Sincronizar Agora</button>
    <div class="sync-status" id="syncStatus">Offline</div>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="abrirTab('dash')"><span class="tab-icon">📊</span>Dashboard</div>
  <div class="tab" onclick="abrirTab('venda')"><span class="tab-icon">💰</span>Venda</div>
  <div class="tab" onclick="abrirTab('produtos')"><span class="tab-icon">📦</span>Produtos</div>
  <div class="tab" onclick="abrirTab('despesas')"><span class="tab-icon">💸</span>Despesas</div>
  <div class="tab" onclick="abrirTab('config')"><span class="tab-icon">⚙️</span>Config</div>
</div>

<script>
let DB = { produtos: [], vendas: [], despesas: [], config: { scriptUrl: '', autoSync: false } };

function loadDB() {
  const saved = localStorage.getItem('balcaoDB');
  if (saved) DB = JSON.parse(saved);
  document.getElementById('scriptUrl').value = DB.config.scriptUrl || '';
  document.getElementById('autoSync').checked = DB.config.autoSync || false;
  atualizarTudo();
  if (DB.config.autoSync && DB.config.scriptUrl) sincronizarAgora();
}

function saveDB() {
  localStorage.setItem('balcaoDB', JSON.stringify(DB));
  atualizarTudo();
}

function toast(msg, color='#10b981') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = color;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2000);
}

function abrirTab(nome) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + nome).classList.add('active');
  event.target.closest('.tab').classList.add('active');
}

function salvarConfig() {
  DB.config.scriptUrl = document.getElementById('scriptUrl').value.trim();
  DB.config.autoSync = document.getElementById('autoSync').checked;
  saveDB();
  toast('Config salvo!');
  if (DB.config.autoSync) sincronizarAgora();
}

async function sincronizarAgora() {
  if (!DB.config.scriptUrl) return toast('Cola a URL do script primeiro', '#ef4444');
  document.getElementById('syncStatus').textContent = 'Sincronizando...';
  try {
    // 1. Puxa dados da planilha
    const res = await fetch(DB.config.scriptUrl);
    const dados = await res.json();
    DB.produtos = dados.produtos || [];
    DB.vendas = dados.vendas || [];
    DB.despesas = dados.despesas || [];
    saveDB();
    document.getElementById('syncStatus').textContent = 'Sincronizado ' + new Date().toLocaleTimeString();
    toast('Dados atualizados!');
  } catch (e) {
    document.getElementById('syncStatus').textContent = 'Erro ao sincronizar';
    toast('Erro: ' + e.message, '#ef4444');
  }
}

async function enviarPlanilha(tipo, dados) {
  if (!DB.config.autoSync ||!DB.config.scriptUrl) return;
  try {
    await fetch(DB.config.scriptUrl, {
      method: 'POST',
      mode: 'no-cors',
      body: JSON.stringify({ type: tipo,...dados })
    });
    document.getElementById('syncStatus').textContent = 'Enviado ' + new Date().toLocaleTimeString();
  } catch (e) {
    document.getElementById('syncStatus').textContent = 'Falha ao enviar';
  }
}

function salvarProduto() {
  const p = {
    nome: document.getElementById('prodNome').value,
    custo: parseFloat(document.getElementById('prodCusto').value),
    margem: parseFloat(document.getElementById('prodMargem').value),
    estoqueAtual: parseInt(document.getElementById('prodEstoque').value),
    estoqueMinimo: parseInt(document.getElementById('prodEstoqueMin').value)
  };
  if (!p.nome || isNaN(p.custo)) return toast('Preenche nome e custo', '#ef4444');
  p.preco = p.custo * (1 + p.margem / 100);
  const idx = DB.produtos.findIndex(x => x.nome === p.nome);
  if (idx >= 0) DB.produtos[idx] = p; else DB.produtos.push(p);
  saveDB();
  enviarPlanilha('produto', p);
  document.querySelectorAll('#prodNome,#prodCusto,#prodMargem,#prodEstoque,#prodEstoqueMin').forEach(i => i.value = '');
  toast('Produto salvo!');
}

function registrarVenda() {
  const nome = document.getElementById('vendaProduto').value;
  const qtd = parseInt(document.getElementById('vendaQtd').value);
  const preco = parseFloat(document.getElementById('vendaPreco').value);
  const prod = DB.produtos.find(p => p.nome === nome);
  if (!prod ||!qtd ||!preco) return toast('Preenche tudo', '#ef4444');
  if (prod.estoqueAtual < qtd) return toast('Estoque insuficiente', '#ef4444');
  prod.estoqueAtual -= qtd;
  const v = { data: new Date().toISOString(), produto: nome, qtd, total: preco * qtd, lucro: (preco - prod.custo) * qtd, custoTotal: prod.custo * qtd };
  DB.vendas.unshift(v);
  saveDB();
  enviarPlanilha('venda', v);
  document.getElementById('vendaQtd').value = 1;
  document.getElementById('vendaPreco').value = '';
  toast('Venda registrada!');
}

function salvarDespesa() {
  const d = {
    desc: document.getElementById('despDesc').value,
    valor: parseFloat(document.getElementById('despValor').value),
    data: new Date().toISOString()
  };
  if (!d.desc ||!d.valor) return toast('Preenche tudo', '#ef4444');
  DB.despesas.unshift(d);
  saveDB();
  enviarPlanilha('despesa', d);
  document.getElementById('despDesc').value = '';
  document.getElementById('despValor').value = '';
  toast('Despesa adicionada!');
}

function atualizarTudo() {
  const hoje = new Date().toDateString();
  const vendasHoje = DB.vendas.filter(v => new Date(v.data).toDateString() === hoje);
  const totalVendas = vendasHoje.reduce((s, v) => s + v.total, 0);
  const lucroHoje = vendasHoje.reduce((s, v) => s + v.lucro, 0);
  document.getElementById('vendasHoje').textContent = 'R$ ' + totalVendas.toFixed(2);
  document.getElementById('lucroHoje').textContent = 'R$ ' + lucroHoje.toFixed(2);
  document.getElementById('ticketMedio').textContent = 'R$ ' + (vendasHoje.length? (totalVendas / vendasHoje.length).toFixed(2) : '0.00');
  document.getElementById('estoqueBaixo').textContent = DB.produtos.filter(p => p.estoqueAtual <= p.estoqueMinimo).length;

  const top = {};
  vendasHoje.forEach(v => top[v.produto] = (top[v.produto] || 0) + v.qtd);
  const topHtml = Object.entries(top).sort((a, b) => b[1] - a[1]).slice(0, 3)
  .map(([n, q]) => `<div class="list-item"><span>${n}</span><span class="badge">${q} un</span></div>`).join('');
  document.getElementById('topProdutos').innerHTML = topHtml || 'Nenhuma venda ainda';

  document.getElementById('vendaProduto').innerHTML = '<option value="">Selecione o produto</option>' +
    DB.produtos.map(p => `<option value="${p.nome}">${p.nome} - R$ ${p.preco.toFixed(2)} | Est: ${p.estoqueAtual}</option>`).join('');

  document.getElementById('listaProdutos').innerHTML = DB.produtos.map(p => `
    <div class="list-item">
      <div><strong>${p.nome}</strong><br><small>Custo R$ ${p.custo} | Venda R$ ${p.preco.toFixed(2)}</small></div>
      <span class="badge ${p.estoqueAtual <= p.estoqueMinimo? 'red' : ''}">${p.estoqueAtual} un</span>
    </div>`).join('');

  document.getElementById('ultimasVendas').innerHTML = DB.vendas.slice(0, 5).map(v => `
    <div class="list-item">
      <div><strong>${v.produto}</strong><br><small>${new Date(v.data).toLocaleString()} | ${v.qtd}x</small></div>
      <span class="badge green">R$ ${v.total.toFixed(2)}</span>
    </div>`).join('');

  document.getElementById('listaDespesas').innerHTML = DB.despesas.slice(0, 10).map(d => `
    <div class="list-item">
      <div><strong>${d.desc}</strong><br><small>${new Date(d.data).toLocaleDateString()}</small></div>
      <span class="badge red">R$ ${d.valor.toFixed(2)}</span>
    </div>`).join('');
}

document.getElementById('vendaProduto').addEventListener('change', function() {
  const prod = DB.produtos.find(p => p.nome === this.value);
  if (prod) document.getElementById('vendaPreco').value = prod.preco.toFixed(2);
});

loadDB();
</script>

</body>
</html>
